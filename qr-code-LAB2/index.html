<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./sytle.css" />

    <title>Frontend Mentor | QR code component | Davon Lewis</title>
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Outfit">
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="main-container">

        <div>
          <img src="./images/image-qr-code.png" alt="QR Code Image" class="qr-code-img"/>
          <p class="qr-header">
            Improve your front-end <br> skills by building projects
          </p>
          <p class="scan-prompt">
            Scan the QR code to visit Frontend <br> Mentor and take your coding skills
            to <br>the next level
          </p>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
