<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css">
    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div id="blog-art"><img src="./assets/images/illustration-article.svg" alt="blog art" class="blog-art"></div>
      <div class="sub-container">
        <div class="learning-bg">
          <p class="learning-header">Learning</p>
        </div>
        <p class="published-header">Published 21 Dec 2023</p>
        <p class="html-header">HTML & CSS foundations</p>
        <p class="description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="greg-container">
          <img
            src="./assets/images/image-avatar.webp"
            alt="Greg Hooper Profile Picture" class="profile-pic"
          />
          <p class="greg-name">Greg Hooper</p>
        </div>
      </div>
    </div>
      
      
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Davon Lewis</a>.
    </footer>
  </body>
</html>
